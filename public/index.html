<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchemy Service Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">▲</span>
                <h1>Alchemy <span>Monitor</span></h1>
            </div>
            <div id="overall-status-badge" class="badge">Checking...</div>
        </header>

        <main>
            <section class="status-grid" id="status-grid">
                <!-- Status cards will be injected here -->
            </section>

            <section class="history-section">
                <h2>Health History</h2>
                <div id="history-list" class="history-list">
                    <!-- History items will be injected here -->
                </div>
            </section>

            <section class="debug-section">
                <h2>Debug Logs</h2>
                <div id="debug-logs" class="debug-logs glass">
                    <!-- Logs will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>Last Updated: <span id="last-update">Never</span></p>
            <div class="refresh-indicator">Auto-refreshing every 60s</div>
        </footer>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                console.log('API Data received:', data);
                updateUI(data);
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        function updateUI(data) {
            const badge = document.getElementById('overall-status-badge');
            badge.textContent = data.overallStatus;
            badge.className = 'badge ' + data.overallStatus.toLowerCase().replace(/ /g, '-');

            const grid = document.getElementById('status-grid');
            grid.innerHTML = '';
            data.services.forEach(service => {
                const card = document.createElement('div');
                card.className = 'status-card glass';
                card.innerHTML = `
                    <div class="service-info">
                        <h3>${service.name}</h3>
                        <div class="status-indicator ${service.status.toLowerCase().replace(/ /g, '-')}"></div>
                    </div>
                    <div class="service-metrics">
                        <span class="status-text">${service.status}</span>
                        <span class="latency">${service.latency}</span>
                    </div>
                    ${service.error ? `<div class="error-detail">${service.error}</div>` : ''}
                `;
                grid.appendChild(card);
            });

            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            data.history.forEach(item => {
                const entry = document.createElement('div');
                entry.className = 'history-item glass';
                entry.innerHTML = `
                    <span class="history-time">${new Date(item.timestamp).toLocaleTimeString()}</span>
                    <span class="history-status ${item.status.toLowerCase().replace(/ /g, '-')}">${item.status}</span>
                `;
                historyList.appendChild(entry);
            });

            document.getElementById('last-update').textContent = new Date(data.lastUpdate).toLocaleString();

            const debugLogs = document.getElementById('debug-logs');
            if (data.logs && data.logs.length > 0) {
                debugLogs.innerHTML = data.logs.map(log => `<div class="log-entry">${log}</div>`).join('');
            } else {
                debugLogs.innerHTML = '<div class="log-entry">Waiting for logs...</div>';
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
